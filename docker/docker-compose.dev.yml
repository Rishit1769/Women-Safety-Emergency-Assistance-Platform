version: '3.9'

# NOTE: PostgreSQL runs locally on Windows (not in Docker).
# Run scripts/setup-local-db.ps1 once to create the rakshaai_user and rakshaai_dev database.
# DATABASE_URL in apps/backend/.env already points to localhost:5432.

services:
  redis:
    image: redis:7-alpine
    container_name: rakshaai_redis_dev
    command: redis-server
    ports:
      - "6379:6379"

  # pgAdmin — connects to your local PostgreSQL (host.docker.internal)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: rakshaai_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@rakshaai.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes: {}
